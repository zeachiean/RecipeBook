name: Release

# Thin wrapper around the local reusable breakbone-release workflow.
#
# Canonical source of breakbone-release.yml lives in:
#   - WoWAddons/breakbone-shared/workflows/breakbone-release.yml (dev tree)
#   - breakbone-addons/release-workflows (human-readable reference)
# But is COPIED into each addon's own .github/workflows/ because GitHub's
# free-tier org plan doesn't allow cross-repo reusable workflow access for
# private repos. Keep all three copies in sync when changing the pipeline.
#
# Triggers:
#   push (tag)            -> publish=true (real release)
#   workflow_dispatch     -> publish=false by default (dry-run), toggle in UI

on:
  push:
    tags:
      - '**'
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to CurseForge + GitHub Release + site rebuild (uncheck for dry-run)"
        type: boolean
        default: false

jobs:
  release:
    uses: ./.github/workflows/breakbone-release.yml
    with:
      addon_name: RecipeBook
      budget_kb: 2000
      publish: ${{ github.event_name == 'push' || inputs.publish }}
    secrets: inherit
