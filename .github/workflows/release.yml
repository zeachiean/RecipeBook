name: Release

# This workflow is a thin wrapper around the reusable breakbone-release workflow
# in breakbone-addons/release-workflows. See that repo's README for docs.
#
# Triggers:
#   push (tag)            -> publish=true (real release)
#   workflow_dispatch     -> publish=false by default (dry-run), toggle in UI

on:
  push:
    tags:
      - '**'
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to CurseForge + GitHub Release + site rebuild (uncheck for dry-run)"
        type: boolean
        default: false

jobs:
  release:
    uses: breakbone-addons/release-workflows/.github/workflows/breakbone-release.yml@main
    with:
      addon_name: RecipeBook
      budget_kb: 2000
      publish: ${{ github.event_name == 'push' || inputs.publish }}
    secrets: inherit
